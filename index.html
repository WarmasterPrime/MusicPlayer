<!DOCTYPE html>
<html lang="en" data-theme="dark">
	<head>
		<title>MusicPlayer</title>
		<meta charset="UTF-8" />
		<meta name="description" content="Experience a whole new way of viewing audio with the unique audio visualizer. Customize your audio visualizer to the max with in-depth customization controls. Optimized to render everything without minimal lag." />
		<meta name="keywords" content="" />
		<meta name="author" content="Daniel K. Valente" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="theme-color" content="#FF0000">
		<meta property="og:image" content="http://doft.info/musicplayer/assets/graphics/logo.png" />
		<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
		<meta http-equiv="Pragma" content="no-cache" />
		<meta http-equiv="Expires" content="0" />
		<link rel="stylesheet" href="assets/css/main.css">
		<script type="module" src="assets/js/main.mjs"></script>
		<style id="overrides"></style>
	</head>
	<body>
	<div id="tooltip" class="tooltip"></div>
	<div class="left-panel-trigger" id="left-panel-trigger"></div>
	<div class="left-panel" id="left-panel">
		<div id="auth-buttons" class="auth-buttons"></div>
		<button id="settings-btn" class="settings-btn" title="Settings">&#9881;</button>
	</div>
	<div class="middle" hidden></div>
	<div id="bg" class="main-container"></div>
	<div id="new-bg" class="bg">
		<div class="obj" id="obj"></div>
	</div>
	<div id="main-before" class="main"></div>
		<div id="desc" class="desc">
			<div id="song-name" class="song-name"></div>
			<div id="caption" class="subtitle"></div>
			<div id="url" class="url"></div>
		</div>
		<div id="main" class="main">
			<div class="menu-trigger" id="menu-trigger"></div>
			<div class="menu" id="menu-tab">Songs</div>
			<div id="media" class="media">
				<!-- Hidden elements that code depends on -->
				<audio id="player" src="" loop hidden></audio>
				<div hidden>
					<select id="design" value="radial">
						<option value="bar">Bar</option>
						<option value="line">Line</option>
						<option value="verticalLines">Vertical Lines</option>
						<option value="curvedLines">Curve</option>
						<option value="circle">Circle</option>
						<option value="polygon">Polygon</option>
					</select>
					<input id="fillPolygonOption" type="checkbox" checked>
					<input id="bg-hide-opt" type="checkbox">
					<input id="sn" type="checkbox" checked>
					<input id="bar-toggle" type="checkbox" checked>
					<input id="shuffle-opt" type="checkbox">
					<input id="ghost" type="checkbox">
					<input id="fade" type="checkbox">
					<input id="new-bg-opt" type="checkbox" checked>
					<input id="sphere" type="checkbox" checked>
					<input id="lyrics" type="checkbox" checked>
					<input id="cbg" type="checkbox" checked>
					<input id="hex-color" type="color" value="#0F0006">
					<input id="audioAccuracy" value="512">
					<input id="file-upload" type="file">
					<input id="theme-toggle" type="checkbox">
					<input id="r" type="range" value="250" min="0" max="255" step="1">
					<input id="g" type="range" value="50" min="0" max="255" step="1">
					<input id="b" type="range" value="25" min="0" max="255" step="1">
				</div>
			</div>
		</div>
	</body>
</html>
