<!DOCTYPE html>
<html lang="en" data-theme="dark">
	<head>
		<title>MusicPlayer</title>
		<meta charset="UTF-8" />
		<meta name="description" content="Experience a whole new way of viewing audio with the unique audio visualizer. Customize your audio visualizer to the max with in-depth customization controls. Optimized to render everything without minimal lag." />
		<meta name="keywords" content="" />
		<meta name="author" content="Daniel K. Valente" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="theme-color" content="#FF0000">
		<meta property="og:image" content="http://doft.info/musicplayer/assets/graphics/logo.png" />
		<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
		<meta http-equiv="Pragma" content="no-cache" />
		<meta http-equiv="Expires" content="0" />
		<link rel="stylesheet" href="assets/css/main.css">
		<script type="module" src="assets/js/main.mjs"></script>
		<style id="overrides"></style>
	</head>
	<body>
	<div id="tooltip" class="tooltip"></div>
	<div class="middle" hidden></div>
	<div id="bg" class="main-container"></div>
	<div id="new-bg" class="bg">
		<div class="obj" id="obj"></div>
	</div>
	<div id="main-before" class="main"></div>
		<div id="desc" class="desc">
			<div id="song-name" class="song-name"></div>
			<div id="caption" class="subtitle"></div>
			<div id="url" class="url"></div>
		</div>
		<div id="main" class="main">
			<div class="menu-trigger" id="menu-trigger"></div>
			<div class="menu" id="menu-tab">Songs</div>
			<div id="media" class="media">
				<div class="mnav">
					<audio id="player" src="" controls loop></audio>
					<div id="auth-buttons" class="auth-buttons"></div>
					<div class="options" id="options">
						<span class="item">
							<label>Design:</label>
							<select id="design" value="radial">
								<option value="bar">Bar</option>
								<option value="line">Line</option>
								<option value="verticalLines">Vertical Lines</option>
								<option value="curvedLines">Curve</option>
							</select>
						</span>
						<span class="item">
							<label class="toggle-switch"><input id="fillPolygonOption" type="checkbox" checked><span class="slider"></span></label>
							<span class="toggle-label">Fill</span>
						</span>
						<span id="bg-hide" hidden>
							<label>BG: </label><input id="bg-hide-opt" type="checkbox">
						</span>
						<span class="item">
							<label class="toggle-switch"><input id="sn" type="checkbox" checked><span class="slider"></span></label>
							<span class="toggle-label">SN</span>
						</span>
						<span class="item">
							<label class="toggle-switch"><input id="bar-toggle" type="checkbox" checked><span class="slider"></span></label>
							<span class="toggle-label">Bar</span>
						</span>
						<span class="item">
							<label class="toggle-switch"><input id="shuffle-opt" type="checkbox"><span class="slider"></span></label>
							<span class="toggle-label">&#10545;</span>
						</span>
						<span class="item">
							<label class="toggle-switch"><input id="ghost" type="checkbox"><span class="slider"></span></label>
							<span class="toggle-label">Ghost</span>
						</span>
						<span class="item">
							<label class="toggle-switch"><input id="fade" type="checkbox"><span class="slider"></span></label>
							<span class="toggle-label">Fades</span>
						</span>
						<span class="item">
							<label class="toggle-switch"><input id="new-bg-opt" type="checkbox" checked><span class="slider"></span></label>
							<span class="toggle-label">New BG</span>
						</span>
						<span class="item">
							<label class="toggle-switch"><input id="sphere" type="checkbox" checked><span class="slider"></span></label>
							<span class="toggle-label">Sphere</span>
						</span>
						<span class="item">
							<label class="toggle-switch"><input id="lyrics" type="checkbox" checked><span class="slider"></span></label>
							<span class="toggle-label">Lyrics</span>
						</span>
						<span class="item">
							<label class="toggle-switch"><input id="cbg" type="checkbox" checked><span class="slider"></span></label>
							<span class="toggle-label">Hex Colors</span>
						</span>
						<span class="item"><label>Hex Color:</label><input id="hex-color" type="color" value="#0F0006"></span>
						<span class="item"><label>Accuracy:</label><input id="audioAccuracy" value="512" /></span>
						<span class="item" type="file"><label>Upload:</label><input id="file-upload" type="file" /></span>
						<span class="item">
							<label class="toggle-switch"><input id="theme-toggle" type="checkbox"><span class="slider"></span></label>
							<span class="toggle-label">Light</span>
						</span>
					</div>
					<label style="user-select:none;">Red: </label><input id="r" type="range" value="250" min="0" max="255" step="1">
					<label style="user-select:none;">Green: </label><input id="g" type="range" value="50" min="0" max="255" step="1">
					<label style="user-select:none;">Blue: </label><input id="b" type="range" value="25" min="0" max="255" step="1">
				</div>
			</div>
		</div>
	</body>
</html>
